<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase — Multi-Step E-commerce Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header Layout Elements -->
  <header class="app-header">
    <div class="header-container">
      <h1 class="logo">ShopEase</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn-theme-toggle" aria-label="Toggle theme">🌓</button>
        <button id="cart-nav-btn" class="btn btn-cart">
          Shopping Cart <span id="cart-count" class="badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Progress Bar Framework Tracker -->
  <div class="progress-bar-wrapper">
    <div class="progress-steps-container">
      <div class="progress-step active" data-step="1">1. Choose Products</div>
      <div class="progress-step" data-step="2">2. Review Cart</div>
      <div class="progress-step" data-step="3">3. Billing Details</div>
    </div>
  </div>

  <!-- Wizard Application Windows -->
  <main class="main-content">
    <div class="container">

      <!-- STEP 1: CATALOG OVERVIEW -->
      <section id="step-1" class="wizard-step active">
        <!-- Running Carousel Banner Framework Container -->
        <div class="banner-carousel-wrapper">
          <div id="hero-banner-carousel" class="banner-carousel"></div>
        </div>

        <div class="catalog-controls">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search products by title...">
          </div>
          <div class="filter-sort-group">
            <div class="filter-box">
              <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="clothing">Clothing</option>
                <option value="electronics">Electronics</option>
                <option value="books">Books</option>
                <option value="home">Home</option>
              </select>
            </div>
            <div class="sort-box">
              <select id="sort-select">
                <option value="default">Sort Options</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="rating">Top Customer Ratings</option>
              </select>
            </div>
          </div>
        </div>

        <div id="product-grid" class="products-grid"></div>
      </section>

      <!-- STEP 2: BASKET BREAKDOWN -->
      <section id="step-2" class="wizard-step">
        <h2 class="section-title">Your Selected Items</h2>
        <div class="cart-layout">
          <div id="cart-items" class="cart-items-list"></div>
          <div class="cart-summary-card">
            <h3>Order Subtotal</h3>
            <div class="summary-row">
              <span>Estimated Subtotal:</span>
              <span id="cart-subtotal" class="total-price">$0.00</span>
            </div>
            <div class="summary-actions">
              <button class="btn btn-secondary prev-step-btn" data-target="1">Return to Shop</button>
              <button id="checkout-btn" class="btn btn-primary" disabled>Proceed to Checkout</button>
            </div>
          </div>
        </div>
      </section>

      <!-- STEP 3: CUSTOMER CHECKOUT -->
      <section id="step-3" class="wizard-step">
        <h2 class="section-title">Shipping & Settlement Details</h2>
        <div class="checkout-form-container">
          <form id="checkout-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="full-name">Full Name *</label>
                <input type="text" id="full-name" required placeholder="John Doe">
                <span class="error-msg"></span>
              </div>
              <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required placeholder="john@example.com">
                <span class="error-msg"></span>
              </div>
            </div>

            <div class="form-group">
              <label for="address-1">Street Address Line 1 *</label>
              <input type="text" id="address-1" required placeholder="Enter street name and house number">
              <span class="error-msg"></span>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" required placeholder="City name">
                <span class="error-msg"></span>
              </div>
              <div class="form-group">
                <label for="state">State *</label>
                <input type="text" id="state" required placeholder="State initials">
                <span class="error-msg"></span>
              </div>
              <div class="form-group">
                <label for="pincode">PIN / Postal Code *</label>
                <input type="text" id="pincode" required placeholder="ZIP Code">
                <span class="error-msg"></span>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-secondary prev-step-btn" data-target="2">Back to Cart</button>
              <button type="submit" class="btn btn-success">Complete Purchase</button>
            </div>
          </form>
        </div>
      </section>

    </div>
  </main>

  <!-- Notification Toast Container -->
  <div id="toast-container" class="toast-wrapper"></div>

  <!-- Final Confirmation Success Modal Box -->
  <div id="confirmation-modal" class="modal-backdrop">
    <div class="modal-box">
      <div class="success-icon">🎉</div>
      <h2>Order Placed Successfully!</h2>
      <p>Thank you for shopping with ShopEase. Your transaction receipt reference number is <strong id="summary-order-id">#SE000000</strong>.</p>
      <button id="close-confirmation" class="btn btn-primary">Continue Shopping</button>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script src="app.js"></script>
</body>
</html>
