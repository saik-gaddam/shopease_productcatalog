<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase — E-commerce Product Catalog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header & Navigation -->
  <header class="header">
    <div class="header-inner container">
      <h1 class="logo">ShopEase</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle Dark Mode">🌓</button>
        <button id="cart-btn" class="btn-icon" aria-label="Open Cart">
          🛒 <span id="cart-count" class="cart-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Layout Container -->
  <main class="container main-content">
    <!-- Toolbar: Search, Filter, Sort -->
    <section class="toolbar" aria-label="Catalog Filters">
      <input type="text" id="search-input" placeholder="Search products...">
      
      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="books">Books</option>
        <option value="home">Home & Kitchen</option>
      </select>

      <select id="sort-select">
        <option value="default">Sort By</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="rating">Top Rated</option>
      </select>
    </section>

    <!-- Product Grid Explorer -->
    <section id="product-grid" class="product-grid">
      <!-- Dynamic product cards render here via JS -->
    </section>
  </main>

  <!-- Slide-out Cart Drawer -->
  <div id="cart-drawer" class="cart-drawer">
    <div class="drawer-header">
      <h2>Your Cart</h2>
      <button id="close-cart" class="btn-close">&times;</button>
    </div>
    <div id="cart-items" class="drawer-body">
      <!-- Dynamic cart items list here -->
    </div>
    <div class="drawer-footer">
      <div class="cart-summary">
        <span>Subtotal:</span>
        <span id="cart-subtotal">$0.00</span>
      </div>
      <button id="checkout-btn" class="btn btn-primary btn-block">Proceed to Checkout</button>
    </div>
  </div>

  <!-- Checkout Form Modal -->
  <div id="checkout-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Secure Checkout</h2>
        <button id="close-modal" class="btn-close">&times;</button>
      </div>
      <form id="checkout-form" novalidate>
        <div class="form-group">
          <label for="full-name">Full Name *</label>
          <input type="text" id="full-name" required>
          <span class="error-msg" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" required>
          <span class="error-msg" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number (10 Digits) *</label>
          <input type="tel" id="phone" required pattern="[0-9]{10}">
          <span class="error-msg" id="phone-error"></span>
        </div>
        <div class="form-group">
          <label for="address">Shipping Address *</label>
          <textarea id="address" rows="3" required></textarea>
          <span class="error-msg" id="address-error"></span>
        </div>
        <button type="submit" class="btn btn-success btn-block">Place Order</button>
      </form>
    </div>
  </div>

  <!-- Order Confirmation Success View overlay -->
  <div id="confirmation-modal" class="modal">
    <div class="modal-content success-card">
      <div class="success-icon">🎉</div>
      <h2>Order Confirmed!</h2>
      <p>Thank you for shopping with ShopEase. Your order has been placed successfully.</p>
      <div class="order-id-box">
        Order ID: <strong id="summary-order-id">#000000</strong>
      </div>
      <button id="close-confirmation" class="btn btn-primary">Continue Shopping</button>
    </div>
  </div>

  <!-- Global Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
