<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase — Multi-Step E-commerce Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header & Navigation -->
  <header class="header">
    <div class="header-inner container">
      <h1 class="logo">ShopEase</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle Dark Mode">🌓</button>
        <button id="cart-nav-btn" class="btn-icon" aria-label="View Cart">
          🛒 <span id="cart-count" class="cart-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Step Progress Indicator -->
  <div class="container wizard-progress-container">
    <div class="wizard-progress">
      <div class="progress-step active" id="step-dot-1">1<span>Products</span></div>
      <div class="progress-line"></div>
      <div class="progress-step" id="step-dot-2">2<span>Your Cart</span></div>
      <div class="progress-line"></div>
      <div class="progress-step" id="step-dot-3">3<span>Checkout</span></div>
    </div>
  </div>

  <!-- Wizard Steps Container -->
  <main class="container main-content">
    
    <!-- STEP 1: PRODUCT CATALOG -->
    <section id="step-1" class="wizard-step active">
      <div class="toolbar" aria-label="Catalog Filters">
        <input type="text" id="search-input" placeholder="Search products...">
        <select id="category-filter">
          <option value="all">All Categories</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing</option>
          <option value="books">Books</option>
          <option value="home">Home & Kitchen</option>
        </select>
        <select id="sort-select">
          <option value="default">Sort By</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      <div id="product-grid" class="product-grid"></div>
    </section>

    <!-- STEP 2: DEDICATED CART PAGE -->
    <section id="step-2" class="wizard-step">
      <div class="step-header">
        <h2>Review Your Shopping Cart</h2>
      </div>
      <div id="cart-items" class="cart-items-wrapper">
        <!-- Dynamic items list -->
      </div>
      <div class="cart-summary-box">
        <div class="cart-summary-row">
          <span>Subtotal:</span>
          <span id="cart-subtotal">$0.00</span>
        </div>
        <div class="step-navigation-buttons">
          <button class="btn btn-secondary prev-step-btn" data-target="1">← Back to Shopping</button>
          <button id="checkout-btn" class="btn btn-primary">Proceed to Checkout →</button>
        </div>
      </div>
    </section>

    <!-- STEP 3: SECURE CHECKOUT FORM -->
    <section id="step-3" class="wizard-step">
      <div class="step-header">
        <h2>Secure Checkout</h2>
      </div>
      <form id="checkout-form" class="checkout-wizard-form" novalidate>
        <div class="form-group">
          <label for="full-name">Full Name *</label>
          <input type="text" id="full-name" required>
          <span class="error-msg" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" required>
          <span class="error-msg" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number (10 Digits) *</label>
          <input type="tel" id="phone" required pattern="[0-9]{10}">
          <span class="error-msg" id="phone-error"></span>
        </div>
        <div class="form-group">
          <label for="address">Shipping Address *</label>
          <textarea id="address" rows="3" required></textarea>
          <span class="error-msg" id="address-error"></span>
        </div>
        <div class="step-navigation-buttons">
          <button type="button" class="btn btn-secondary prev-step-btn" data-target="2">← Back to Cart</button>
          <button type="submit" class="btn btn-success">Complete & Place Order 🎉</button>
        </div>
      </form>
    </section>

    <!-- FINAL CONFIRMATION OVERLAY (MODAL) -->
    <div id="confirmation-modal" class="modal">
      <div class="modal-content success-card">
        <div class="success-icon">🎉</div>
        <h2>Order Confirmed!</h2>
        <p>Thank you for shopping with ShopEase. Your order has been placed successfully.</p>
        <div class="order-id-box">
          Order ID: <strong id="summary-order-id">#000000</strong>
        </div>
        <button id="close-confirmation" class="btn btn-primary">Continue Shopping</button>
      </div>
    </div>

  </main>

  <!-- Global Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

<!-- Change js/data.js to js/products.js -->
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
